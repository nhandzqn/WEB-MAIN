<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>THPT Vân Canh — Nền tảng câu lạc bộ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #12151c;
    --surface2: #1a1e2a;
    --surface3: #222736;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #eef0f6;
    --text-soft: rgba(238,240,246,0.82);
    --muted: #6b7590;
    --accent: #5b6cff;
    --accent-light: #7b8aff;
    --accent2: #ff5c8a;
    --accent3: #34d399;
    --accent4: #fbbf24;
    --accent-glow: rgba(91,108,255,0.2);
    --accent2-glow: rgba(255,92,138,0.15);
    --sidebar-w: 260px;
    --font: 'Be Vietnam Pro', sans-serif;
    --font-display: 'Playfair Display', serif;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.25);
    --shadow-heavy: 0 20px 60px rgba(0,0,0,0.5);
    --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  body.auth-mode { overflow: auto; height: auto; min-height: 100vh; }

  .particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 40%, rgba(91,108,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 85% 25%, rgba(255,92,138,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 50% 70% at 60% 85%, rgba(52,211,153,0.06) 0%, transparent 55%);
  }

  #auth-screen {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; position: relative; overflow: hidden;
    padding: 16px;
  }

  .auth-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(91,108,255,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 30%, rgba(255,92,138,0.1) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 70% 80%, rgba(52,211,153,0.07) 0%, transparent 60%);
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    0% { opacity: 0.8; transform: scale(1); }
    100% { opacity: 1; transform: scale(1.05); }
  }

  .auth-dots {
    position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .auth-card {
    position: relative; z-index: 10;
    background: linear-gradient(145deg, var(--surface), rgba(18,21,28,0.95));
    border: 1px solid var(--border2);
    border-radius: 24px;
    padding: 48px 44px;
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow-heavy), 0 0 0 1px rgba(91,108,255,0.06), inset 0 1px 0 rgba(255,255,255,0.04);
    animation: cardAppear 0.6s cubic-bezier(0.34,1.56,0.64,1);
    overflow-y: auto;
    max-height: calc(100vh - 32px);
    backdrop-filter: blur(20px);
  }

  @keyframes cardAppear {
    from { opacity:0; transform: translateY(30px) scale(0.97); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }

  .auth-logo {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 36px;
  }

  .auth-logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 8px 24px rgba(91,108,255,0.3);
    animation: iconFloat 3s ease-in-out infinite;
  }

  @keyframes iconFloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .auth-logo-text {
    font-family: var(--font-display);
    font-size: 22px; font-weight: 700;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--text), var(--accent-light));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .auth-tabs {
    display: flex; gap: 0;
    background: var(--surface2);
    border-radius: 12px;
    padding: 4px;
    margin-bottom: 30px;
    border: 1px solid var(--border);
  }

  .auth-tab {
    flex: 1; padding: 11px;
    border: none; background: transparent;
    color: var(--muted); font-family: var(--font);
    font-size: 14px; font-weight: 600;
    border-radius: 9px; cursor: pointer;
    transition: all var(--transition);
    position: relative;
  }

  .auth-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: #fff;
    box-shadow: 0 4px 16px rgba(91,108,255,0.4);
  }

  .auth-tab:not(.active):hover { color: var(--text); background: rgba(255,255,255,0.04); }

  .auth-form { display: flex; flex-direction: column; gap: 16px; }

  .field label {
    display: block; font-size: 11px; font-weight: 600;
    color: var(--muted); margin-bottom: 7px; letter-spacing: 0.6px;
    text-transform: uppercase;
  }

  .field input, .field select {
    width: 100%; padding: 13px 16px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font); font-size: 14px;
    outline: none; transition: all var(--transition);
  }

  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: rgba(26,30,42,0.8);
  }

  .field input::placeholder { color: var(--muted); font-weight: 300; }
  .field select { cursor: pointer; }
  .field select option { background: var(--surface2); }

  .field .input-error {
    border-color: var(--accent2) !important;
    box-shadow: 0 0 0 3px var(--accent2-glow) !important;
  }

  .field-error-msg {
    font-size: 12px; color: var(--accent2);
    margin-top: 6px;
    font-weight: 500;
    display: none;
    animation: shakeIn 0.3s ease;
  }

  @keyframes shakeIn {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .btn-submit {
    margin-top: 8px; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border: none; border-radius: var(--radius-sm);
    color: #fff; font-family: var(--font);
    font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all var(--transition);
    box-shadow: 0 8px 24px rgba(91,108,255,0.35);
    letter-spacing: 0.3px;
    position: relative; overflow: hidden;
  }

  .btn-submit::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15));
    opacity: 0; transition: opacity var(--transition);
  }

  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(91,108,255,0.5); }
  .btn-submit:hover::before { opacity: 1; }
  .btn-submit:active { transform: translateY(0); }

  .verify-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    z-index: 2000; display: none;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .verify-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  .verify-box {
    background: linear-gradient(145deg, var(--surface), rgba(18,21,28,0.98));
    border: 1px solid var(--border2);
    border-radius: 24px; padding: 40px 36px;
    width: 100%; max-width: 400px;
    text-align: center;
    animation: cardAppear 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: var(--shadow-heavy);
  }

  .verify-icon { font-size: 52px; margin-bottom: 18px; }
  .verify-box h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; font-family: var(--font-display); }
  .verify-box p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 26px; }
  .verify-box .email-highlight { color: var(--accent); font-weight: 600; }

  .otp-inputs {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 22px;
  }

  .otp-inputs input {
    width: 48px; height: 58px;
    background: var(--surface2); border: 1.5px solid var(--border2);
    border-radius: 14px; color: var(--text);
    font-family: var(--font); font-size: 22px; font-weight: 700;
    text-align: center; outline: none; transition: all var(--transition);
  }

  .otp-inputs input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: rgba(26,30,42,0.8);
    transform: scale(1.05);
  }

  .verify-resend {
    font-size: 13px; color: var(--muted); margin-bottom: 22px;
  }

  .verify-resend span {
    color: var(--accent); cursor: pointer; font-weight: 600;
    transition: color var(--transition);
  }

  .verify-resend span:hover { color: var(--accent-light); text-decoration: underline; }

  #app { display: none; height: 100vh; flex-direction: row; position: relative; }

  .sidebar-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 50;
  }

  .sidebar {
    width: var(--sidebar-w); background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    flex-shrink: 0; z-index: 60;
    transition: transform 0.3s ease;
  }

  .sidebar-brand {
    padding: 22px 20px 18px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(91,108,255,0.25);
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 700;
    line-height: 1.2;
  }

  .sidebar-close {
    display: none; margin-left: auto;
    background: transparent; border: none;
    color: var(--muted); font-size: 20px; cursor: pointer;
  }

  .sidebar-nav {
    padding: 14px 12px;
    display: flex; flex-direction: column; gap: 2px;
    flex: 1; overflow-y: auto;
  }

  .nav-section-label {
    font-size: 10px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    padding: 12px 8px 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all var(--transition);
    font-size: 14px; font-weight: 500; color: var(--muted);
    border: none; background: transparent; width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--surface2); color: var(--text); }

  .nav-item.active {
    background: linear-gradient(135deg, rgba(91,108,255,0.18), rgba(91,108,255,0.06));
    color: var(--accent-light);
    border: 1px solid rgba(91,108,255,0.2);
    font-weight: 600;
  }

  .nav-icon { font-size: 17px; width: 22px; text-align: center; }

  .nav-badge {
    margin-left: auto; background: var(--accent2);
    color: #fff; font-size: 11px; font-weight: 700;
    padding: 2px 8px; border-radius: 99px;
    box-shadow: 0 2px 8px rgba(255,92,138,0.3);
  }

  .sidebar-user {
    padding: 16px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.01);
  }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }

  .avatar.sm { width: 32px; height: 32px; font-size: 13px; }
  .avatar.lg { width: 44px; height: 44px; font-size: 17px; }
  .avatar.xl { width: 60px; height: 60px; font-size: 24px; }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-status { font-size: 12px; color: var(--accent3); display: flex; align-items: center; gap: 5px; }
  .user-status::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent3); box-shadow:0 0 8px var(--accent3); }

  .btn-icon {
    width: 32px; height: 32px; border-radius: 9px;
    background: transparent; border: none;
    color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all var(--transition);
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); transform: scale(1.05); }

  .mobile-topbar {
    display: none;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 40;
  }

  .mobile-menu-btn {
    background: transparent; border: none;
    color: var(--text); font-size: 22px; cursor: pointer;
    padding: 4px;
  }

  .mobile-brand-name {
    font-family: var(--font-display);
    font-size: 16px; font-weight: 700; flex: 1;
  }

  .main { flex: 1; display: flex; overflow: hidden; flex-direction: column; }

  .page { display: none; flex: 1; overflow: hidden; }
  .page.active { display: flex; animation: pageIn 0.3s ease; }

  @keyframes pageIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #feed-page { flex-direction: row; }

  .feed-center {
    flex: 1; overflow-y: auto; padding: 28px;
    display: flex; flex-direction: column; gap: 18px;
  }

  .feed-center::-webkit-scrollbar { width: 5px; }
  .feed-center::-webkit-scrollbar-track { background: transparent; }
  .feed-center::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }

  .compose-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    transition: border-color var(--transition);
  }

  .compose-box:focus-within { border-color: rgba(91,108,255,0.3); }

  .compose-row { display: flex; align-items: flex-start; gap: 14px; }

  .compose-input {
    flex: 1; background: var(--surface2);
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    padding: 14px 16px; color: var(--text);
    font-family: var(--font); font-size: 14px;
    resize: none; outline: none; min-height: 72px;
    transition: all var(--transition);
    line-height: 1.6;
  }

  .compose-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  .compose-input::placeholder { color: var(--muted); }

  .compose-actions {
    display: flex; align-items: center;
    gap: 8px; margin-top: 14px;
    justify-content: flex-end;
  }

  .btn-post {
    padding: 10px 22px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border: none; border-radius: 9px;
    color: #fff; font-family: var(--font);
    font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all var(--transition);
    box-shadow: 0 4px 16px rgba(91,108,255,0.3);
  }

  .btn-post:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(91,108,255,0.4); }

  .post-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 22px;
    transition: all var(--transition);
  }

  .post-card:hover { border-color: var(--border2); box-shadow: var(--shadow-card); }

  .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .post-meta { flex: 1; min-width: 0; }
  .post-author { font-size: 14px; font-weight: 700; }
  .post-time { font-size: 12px; color: var(--muted); margin-top: 1px; }

  .post-club-tag {
    font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 99px;
    background: linear-gradient(135deg, rgba(91,108,255,0.12), rgba(91,108,255,0.06));
    color: var(--accent-light); border: 1px solid rgba(91,108,255,0.15);
    letter-spacing: 0.2px;
  }

  .post-body { font-size: 14px; line-height: 1.7; color: var(--text-soft); margin-bottom: 14px; }

  .post-image {
    width: 100%; border-radius: 14px;
    background: var(--surface2); height: 200px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px; margin-bottom: 14px;
    border: 1px solid var(--border);
    overflow: hidden; position: relative;
  }

  .post-image img {
    width: 100%; height: 100%; object-fit: cover; border-radius: 14px;
  }

  .attach-preview-item {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 6px 10px; font-size: 12px;
  }
  .attach-preview-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 6px; }
  .attach-remove { cursor: pointer; color: var(--accent2); margin-left: 4px; font-size: 14px; }

  .post-actions { display: flex; gap: 4px; flex-wrap: wrap; }

  .btn-action {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 9px;
    background: transparent; border: none;
    color: var(--muted); font-family: var(--font);
    font-size: 13px; cursor: pointer; transition: all var(--transition);
    font-weight: 500;
  }

  .btn-action:hover { background: var(--surface2); color: var(--text); }
  .btn-action.liked { color: var(--accent2); }

  .feed-right {
    width: 290px; border-left: 1px solid var(--border);
    overflow-y: auto; padding: 24px 18px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .panel-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
  }

  .panel-title {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    margin-bottom: 14px;
  }

  .member-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0;
  }

  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 13px; font-weight: 600; }
  .member-role { font-size: 11px; color: var(--muted); }

  .online-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity:1; }
    50% { opacity:0.5; }
  }

  .club-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0;
  }

  .club-chip-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }

  .club-chip-info { flex: 1; min-width: 0; }
  .club-chip-name { font-size: 13px; font-weight: 600; }
  .club-chip-count { font-size: 11px; color: var(--muted); }

  .btn-join {
    padding: 6px 14px; border-radius: 8px;
    background: rgba(91,108,255,0.12); border: 1px solid rgba(91,108,255,0.25);
    color: var(--accent-light); font-family: var(--font);
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: all var(--transition); flex-shrink: 0;
  }

  .btn-join:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: scale(1.03); }

  #chat-page { flex-direction: row; }

  .chat-list {
    width: 290px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }

  .chat-list-header {
    padding: 20px 18px 14px;
    border-bottom: 1px solid var(--border);
  }

  .chat-list-header h2 { font-size: 18px; font-weight: 700; margin-bottom: 14px; font-family: var(--font-display); }

  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); padding: 9px 14px;
    transition: border-color var(--transition);
  }

  .search-box:focus-within { border-color: var(--accent); }

  .search-box input {
    flex: 1; background: transparent; border: none;
    color: var(--text); font-family: var(--font);
    font-size: 13px; outline: none;
  }

  .search-box input::placeholder { color: var(--muted); }

  .chat-items { flex: 1; overflow-y: auto; padding: 8px; }

  .chat-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 12px; border-radius: 12px;
    cursor: pointer; transition: all var(--transition);
  }

  .chat-item:hover { background: var(--surface2); }
  .chat-item.active { background: rgba(91,108,255,0.1); border: 1px solid rgba(91,108,255,0.15); }

  .chat-item-info { flex: 1; min-width: 0; }
  .chat-item-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .chat-item-preview {

      <div class="field"><label>Họ tên</label><input type="text" id="reg-name" autocomplete="name"></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" autocomplete="email"></div>
      <div class="field"><label>Mật khẩu</label><input type="password" id="reg-pass" autocomplete="new-password"></div>
      <div class="field"><label>Câu lạc bộ (thực tế)</label><select id="reg-club"></select></div>
      <button class="btn-submit" onclick="doRegister()">Gửi mã xác minh →</button>
    </div>
  </div>
</div>

<div class="verify-overlay" id="forgot-modal"><div class="verify-box"><div id="forgot-step1"><input type="email" id="forgot-email-input" placeholder="Email đã đăng ký"><button onclick="doForgotPass()">Gửi mật khẩu</button></div><div id="forgot-step2" style="display:none"><p>Đã gửi mật khẩu đến email</p></div><button onclick="closeForgotModal()">Đóng</button></div></div>
<div class="verify-overlay" id="verify-modal"><div class="verify-box"><div class="otp-inputs" id="otp-inputs"><input type="text" maxlength="1"><input type="text" maxlength="1"><input type="text" maxlength="1"><input type="text" maxlength="1"><input type="text" maxlength="1"><input type="text" maxlength="1"></div><button onclick="verifyOTP()">Xác nhận</button><button onclick="closeVerify()">Hủy</button></div></div>

<div id="app">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-icon">🎓</div><span class="brand-name">THPT Vân Canh</span><button class="sidebar-close" onclick="closeSidebar()">✕</button></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="showPage('feed')">🏠 Trang chủ</button>
      <button class="nav-item" onclick="showPage('chat')">💬 Tin nhắn</button>
      <button class="nav-item" onclick="showPage('groups')">🏛️ Câu lạc bộ</button>
      <button class="nav-item" onclick="showPage('friends')">👥 Kết bạn</button>
      <button class="nav-item" onclick="showPage('about')">ℹ️ Giới thiệu</button>
      <div class="nav-section-label">Câu lạc bộ của tôi</div>
      <div id="sidebar-my-clubs"></div>
    </nav>
    <div class="sidebar-user"><div class="avatar" id="sidebar-avatar">A</div><div class="user-info"><div class="user-name" id="sidebar-name"></div></div><button class="btn-icon" onclick="doLogout()">⏻</button></div>
  </aside>
  <main class="main">
    <div class="mobile-topbar"><button class="mobile-menu-btn" onclick="openSidebar()">☰</button><span class="mobile-brand-name">THPT Vân Canh</span><button class="btn-icon" onclick="doLogout()">⏻</button></div>
    <div id="feed-page" class="page active">
      <div class="feed-center">
        <div class="compose-box"><textarea class="compose-input" id="post-input" placeholder="Chia sẻ với cộng đồng..."></textarea><div class="compose-actions"><button class="btn-post" onclick="submitPost()">Đăng bài</button></div></div>
        <div id="posts-container"></div>
      </div>
      <aside class="feed-right">
        <div class="panel-card"><div class="panel-title">👥 Bạn bè đang hoạt động</div><div id="online-friends-list"></div></div>
        <div class="panel-card"><div class="panel-title">💡 Gợi ý câu lạc bộ</div><div id="suggest-clubs-list"></div></div>
      </aside>
    </div>
    <div id="chat-page" class="page">
      <div class="chat-list"><div class="chat-list-header"><h2>Trò chuyện</h2></div><div class="chat-items" id="chat-items"></div></div>
      <div class="chat-window"><div class="chat-header"><div class="avatar lg" id="chat-partner-avatar">?</div><div class="chat-header-info"><div class="chat-header-name" id="chat-partner-name">Chưa chọn</div></div></div><div class="messages" id="messages"></div><div class="chat-input-area"><input class="chat-input" id="chat-input" placeholder="Nhập tin nhắn..."><button class="btn-send" onclick="sendMsg()">➤</button></div></div>
    </div>
    <div id="groups-page" class="page"><div class="page-header"><h1>Câu lạc bộ</h1><button class="btn-create" onclick="openCreateModal()">＋ Tạo CLB</button></div><div class="groups-grid" id="groups-grid"></div></div>
    <div id="friends-page" class="page"><div class="friends-container"><input class="friends-search-bar" id="friend-search" placeholder="Tìm kiếm..."><div id="friends-list"></div></div></div>
    <div id="about-page" class="page"><div class="about-content"><div class="about-hero"><div class="about-hero-icon">🎓</div><h1>THPT Vân Canh</h1><p>Nền tảng kết nối học sinh - dữ liệu hoàn toàn thực tế</p></div></div></div>
    <div id="club-detail-page" class="page"><div class="club-detail-content"><button class="club-back-btn" onclick="showPage('groups')">← Quay lại</button><div id="club-detail-inner"></div></div></div>
  </main>
</div>
<div class="modal-overlay" id="create-modal"><div class="modal"><h2>Tạo CLB</h2><input type="text" id="new-club-name" placeholder="Tên CLB"><textarea id="new-club-desc" placeholder="Mô tả"></textarea><div class="modal-actions"><button onclick="closeCreateModal()">Hủy</button><button onclick="createGroup()">Tạo</button></div></div></div>
<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
  // Khởi tạo Firebase listeners và xử lý hoàn toàn dữ liệu thật, không chứa user/club giả
  let currentUser = null;
  let posts = [], groups = [], friendsSet = new Set(), chats = [], messages = [];
  let friendsList = [], allUsers = [];
  let likedPosts = new Set();

  async function renderOnlineFriends() {
    if (!currentUser) return;
    const container = document.getElementById('online-friends-list');
    if (!container) return;
    const friendNames = friendsSet;
    const users = allUsers.filter(u => friendNames.has(u.name));
    if (users.length === 0) { container.innerHTML = '<div style="padding:8px 0;color:var(--muted)">Chưa có bạn bè</div>'; return; }
    container.innerHTML = users.slice(0,5).map(u => `<div class="member-row"><div class="avatar sm">${u.name.charAt(0)}</div><div class="member-info"><div class="member-name">${u.name}</div><div class="member-role">${u.club || 'Thành viên'}</div></div><div class="online-dot"></div></div>`).join('');
  }

  async function renderSuggestClubs() {
    if (!currentUser) return;
    const container = document.getElementById('suggest-clubs-list');
    if (!container) return;
    const joinedNames = new Set(groups.filter(g => g.joined).map(g => g.name));
    const suggest = groups.filter(g => !joinedNames.has(g.name)).slice(0,3);
    if (suggest.length === 0) { container.innerHTML = '<div style="padding:8px 0;color:var(--muted)">Đã tham gia hết CLB rồi!</div>'; return; }
    container.innerHTML = suggest.map((g, idx) => `<div class="club-chip"><div class="club-chip-icon">${g.emoji || '🏛️'}</div><div class="club-chip-info"><div class="club-chip-name">${g.name}</div><div class="club-chip-count">${g.members || 0} thành viên</div></div><button class="btn-join" onclick="joinGroupByIndex(${groups.indexOf(g)})">Tham gia</button></div>`).join('');
  }

  window.joinGroupByIndex = async function(idx) {
    if (!currentUser || idx<0 || idx>=groups.length) return;
    const g = groups[idx];
    if (g.joined) return;
    g.joined = true;
    g.members = (g.members || 0) + 1;
    await window.FB.set('vancanh/groups', groups);
    const safe = currentUser.name.replace(/[.#$[\]]/g, '_');
    await window.FB.set(`vancanh/joined_groups/${safe}`, groups);
    renderGroups(); renderSuggestClubs(); renderSidebarMyClubs();
    showToast('🎉', 'Đã tham gia ' + g.name);
  };

  async function renderGroups() {
    const container = document.getElementById('groups-grid');
    if (!container) return;
    if (!groups.length) { container.innerHTML = '<div style="color:var(--muted);text-align:center">Chưa có CLB nào, hãy tạo CLB đầu tiên!</div>'; return; }
    container.innerHTML = groups.map((g, idx) => `<div class="group-card" onclick="openClubDetail(${idx})"><div class="group-banner">${g.emoji || '🏛️'}</div><div class="group-body"><div class="group-name">${g.name}</div><div class="group-desc">${g.desc}</div><div class="group-meta"><span class="group-members">👥 ${g.members || 0} thành viên</span>${g.joined ? '<span class="joined-badge">✓ Đã tham gia</span>' : `<button class="btn-join" onclick="event.stopPropagation();joinGroupByIndex(${idx})">Tham gia</button>`}</div></div></div>`).join('');
    renderSidebarMyClubs(); renderSuggestClubs();
  }

  async function renderSidebarMyClubs() {
    const myClubs = groups.filter(g => g.joined);
    const container = document.getElementById('sidebar-my-clubs');
    if (!container) return;
    if (!myClubs.length) { container.innerHTML = '<div style="padding:8px;color:var(--muted);font-size:12px">Chưa tham gia CLB</div>'; return; }
    container.innerHTML = myClubs.map(g => `<button class="nav-item nav-item-club" onclick="openClubDetail(${groups.indexOf(g)})"><span class="nav-icon">${g.emoji || '🏛️'}</span><span>${g.name}</span></button>`).join('');
  }

  window.openClubDetail = function(idx) {
    const g = groups[idx];
    if (!g) return;
    const detailDiv = document.getElementById('club-detail-inner');
    detailDiv.innerHTML = `<div class="club-detail-hero"><div class="club-detail-hero-emoji">${g.emoji || '🏛️'}</div><div><h2>${g.name}</h2><p>${g.desc}</p><div>👥 ${g.members || 0} thành viên</div></div></div><div id="club-members-list"></div>`;
    const membersDiv = document.getElementById('club-members-list');
    const members = [g.creator, ...(g.membersList || [])].filter(Boolean);
    membersDiv.innerHTML = members.map(m => `<div class="club-member-card"><div class="avatar sm">${m.charAt(0)}</div><div>${m}</div></div>`).join('');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('club-detail-page').classList.add('active');
    closeSidebar();
  };

  async function renderPosts() {
    const container = document.getElementById('posts-container');
    if (!container) return;
    if (!posts.length) { container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">Chưa có bài viết nào</div>'; return; }
    container.innerHTML = posts.map(p => `<div class="post-card"><div class="post-header"><div class="avatar sm">${p.author.charAt(0)}</div><div><div class="post-author">${p.author}</div><div class="post-time">${p.time}</div></div><span class="post-club-tag">${p.club || 'CLB'}</span></div><div class="post-body">${p.body}</div><div class="post-actions"><button class="btn-action ${likedPosts.has(p.id)?'liked':''}" onclick="toggleLike('${p.id}')">❤️ ${p.likes + (likedPosts.has(p.id)?1:0)}</button><button class="btn-action" onclick="openCommentModal('${p.id}')">💬 ${p.comments || 0}</button></div></div>`).join('');
  }

  async function submitPost() {
    const text = document.getElementById('post-input').value.trim();
    if (!text) return showToast('⚠️', 'Vui lòng nhập nội dung');
    const newPost = { id: Date.now().toString(), author: currentUser.name, club: currentUser.club || 'CLB', time: new Date().toLocaleString(), body: text, likes: 0, comments: 0 };
    const updated = [newPost, ...posts];
    await window.FB.set('vancanh/posts', updated);
    document.getElementById('post-input').value = '';
    showToast('✅', 'Đã đăng');
  }

  async function loadRealData() {
    const users = await window.FB.get('vancanh/users') || [];
    allUsers = users;
    groups = await window.FB.get('vancanh/groups') || [];
    posts = await window.FB.get('vancanh/posts') || [];
    if (currentUser) {
      const safe = currentUser.name.replace(/[.#$[\]]/g, '_');
      const joined = await window.FB.get(`vancanh/joined_groups/${safe}`) || [];
      groups.forEach(g => g.joined = joined.some(j => j.name === g.name));
      const friendNames = await window.FB.get(`vancanh/friends/${safe}`) || [];
      friendsSet = new Set(friendNames);
      const msgs = await window.FB.get(`vancanh/messages/${safe}`) || [];
      messages = msgs;
      renderChats();
    }
    renderGroups(); renderPosts(); renderOnlineFriends(); renderFriendsList(); renderSidebarMyClubs(); renderSuggestClubs();
  }

  async function renderFriendsList() {
    const search = document.getElementById('friend-search')?.value.toLowerCase() || '';
    const filtered = allUsers.filter(u => u.name !== currentUser?.name && u.name.toLowerCase().includes(search));
    const friendNames = friendsSet;
    const suggestions = filtered.filter(u => !friendNames.has(u.name));
    const container = document.getElementById('friends-list');
    if (!container) return;
    container.innerHTML = `<div class="panel-title">💡 Gợi ý kết bạn</div>${suggestions.map(u => `<div class="member-row"><div class="avatar">${u.name.charAt(0)}</div><div><div>${u.name}</div><div class="member-role">${u.club || ''}</div></div><button class="btn-join" onclick="addFriend('${u.name}')">+ Kết bạn</button></div>`).join('')}`;
  }

  window.addFriend = async function(name) {
    if (!currentUser) return;
    friendsSet.add(name);
    const safe = currentUser.name.replace(/[.#$[\]]/g, '_');
    await window.FB.set(`vancanh/friends/${safe}`, [...friendsSet]);
    renderFriendsList(); renderOnlineFriends();
    showToast('👥', `Đã gửi lời mời tới ${name}`);
    setTimeout(async () => {
      if (friendsSet.has(name)) {
        chats.unshift({ name, preview: 'Bạn bè', time: 'Vừa xong', init: name.charAt(0), color: '#5b6cff', unread: true });
        renderChats();
      }
    }, 1500);
  };

  function renderChats() {
    const container = document.getElementById('chat-items');
    if (!container) return;
    if (!chats.length) { container.innerHTML = '<div style="padding:16px;color:var(--muted)">Kết bạn để bắt đầu trò chuyện</div>'; return; }
    container.innerHTML = chats.map((c,i) => `<div class="chat-item" onclick="selectChat(${i})"><div class="avatar sm">${c.init}</div><div><div class="chat-item-name">${c.name}</div><div class="chat-item-preview">${c.preview}</div></div></div>`).join('');
  }

  window.selectChat = function(idx) {
    const c = chats[idx];
    document.getElementById('chat-partner-name').innerText = c.name;
    document.getElementById('chat-partner-avatar').innerText = c.init;
    renderMessages();
  };

  function renderMessages() {
    const container = document.getElementById('messages');
    container.innerHTML = messages.map(m => `<div class="msg ${m.from === currentUser.name ? 'me' : ''}"><div class="msg-bubble">${m.text}</div><span class="msg-time">${m.time}</span></div>`).join('');
  }

  window.sendMsg = async function() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;
    const msg = { from: currentUser.name, text, time: new Date().toLocaleTimeString() };
    messages.push(msg);
    const safe = currentUser.name.replace(/[.#$[\]]/g, '_');
    await window.FB.set(`vancanh/messages/${safe}`, messages);
    input.value = '';
    renderMessages();
  };

  async function loginUser(name) {
    const users = await window.FB.get('vancanh/users') || [];
    const userInfo = users.find(u => u.name === name) || { name, club: 'Thành viên' };
    currentUser = { name, club: userInfo.club, initial: name.charAt(0) };
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('sidebar-name').innerText = name;
    document.getElementById('sidebar-avatar').innerText = name.charAt(0);
    await loadRealData();
    window.FB.listen('vancanh/posts', () => loadRealData());
    window.FB.listen('vancanh/groups', () => loadRealData());
    window.FB.listen('vancanh/users', () => loadRealData());
    sessionStorage.setItem('loggedInUser', name);
  }

  window.doLogin = async function() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    const users = await window.FB.get('vancanh/users') || [];
    const user = users.find(u => u.email === email && u.password === pass);
    if (!user) return showToast('❌', 'Sai email hoặc mật khẩu');
    loginUser(user.name);
  };

  window.doRegister = async function() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const club = document.getElementById('reg-club').value;
    if (!name || !email || pass.length<6) return showToast('⚠️', 'Vui lòng điền đủ thông tin');
    const users = await window.FB.get('vancanh/users') || [];
    if (users.find(u => u.email === email)) return showToast('⚠️', 'Email đã tồn tại');
    users.push({ name, email, password: pass, club });
    await window.FB.set('vancanh/users', users);
    showToast('🎉', 'Đăng ký thành công! Vui lòng đăng nhập');
    switchTab('login');
  };

  async function loadClubsForRegister() {
    const groups = await window.FB.get('vancanh/groups') || [];
    const select = document.getElementById('reg-club');
    select.innerHTML = '<option value="">Chọn CLB thực tế</option>' + groups.map(g => `<option>${g.name}</option>`).join('');
  }

  window.switchTab = function(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
    if (tab === 'register') loadClubsForRegister();
  };

  window.showPage = function(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page+'-page').classList.add('active');
    closeSidebar();
  };
  window.openSidebar = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('active'); };
  window.closeSidebar = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('active'); };
  window.doLogout = () => { sessionStorage.removeItem('loggedInUser'); location.reload(); };
  window.openCreateModal = () => document.getElementById('create-modal').classList.add('open');
  window.closeCreateModal = () => document.getElementById('create-modal').classList.remove('open');
  window.createGroup = async function() {
    const name = document.getElementById('new-club-name').value.trim();
    const desc = document.getElementById('new-club-desc').value.trim();
    if (!name) return showToast('⚠️', 'Nhập tên CLB');
    const newGroup = { name, desc: desc || 'CLB mới', emoji: '🏛️', members: 1, joined: true, creator: currentUser.name, membersList: [currentUser.name] };
    groups.unshift(newGroup);
    await window.FB.set('vancanh/groups', groups);
    closeCreateModal();
    loadRealData();
    showToast('✅', 'Đã tạo CLB');
  };
  window.showToast = (icon, msg) => { const t = document.getElementById('toast'); t.querySelector('#toast-msg').innerText = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); };
  window.toggleLike = async (id) => { if (likedPosts.has(id)) likedPosts.delete(id); else likedPosts.add(id); renderPosts(); };
  window.openCommentModal = (id) => showToast('💬', 'Tính năng đang phát triển');
  window.closeVerify = () => document.getElementById('verify-modal').classList.remove('open');
  window.verifyOTP = () => { closeVerify(); showToast('✅', 'Xác thực thành công'); };
  window.openForgotModal = () => showToast('📧', 'Liên hệ admin để lấy lại mật khẩu');
  window.closeForgotModal = () => document.getElementById('forgot-modal').classList.remove('open');
  window.doForgotPass = () => showToast('📧', 'Vui lòng liên hệ quản trị viên');
  window.addEventListener('DOMContentLoaded', async () => {
    const saved = sessionStorage.getItem('loggedInUser');
    if (saved) loginUser(saved);
    else document.getElementById('auth-screen').style.display = 'flex';
  });
</script>
</body>
</html>

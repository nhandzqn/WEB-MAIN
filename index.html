<style>

  #auth-screen { display: flex; align-items: center; justify-content: center; height: 100vh; position: relative; overflow: hidden; padding: 16px; }
  .auth-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(91,108,255,0.15) 0%, transparent 60%), radial-gradient(ellipse 50% 40% at 80% 30%, rgba(255,92,138,0.1) 0%, transparent 60%), radial-gradient(ellipse 40% 60% at 70% 80%, rgba(52,211,153,0.07) 0%, transparent 60%); animation: bgPulse 8s ease-in-out infinite alternate; }
  @keyframes bgPulse { 0% { opacity: 0.8; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }
  .auth-dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px); background-size: 40px 40px; }
  .auth-card { position: relative; z-index: 10; background: linear-gradient(145deg, var(--surface), rgba(18,21,28,0.95)); border: 1px solid var(--border2); border-radius: 24px; padding: 48px 44px; width: 100%; max-width: 440px; box-shadow: var(--shadow-heavy), 0 0 0 1px rgba(91,108,255,0.06), inset 0 1px 0 rgba(255,255,255,0.04); animation: cardAppear 0.6s cubic-bezier(0.34,1.56,0.64,1); overflow-y: auto; max-height: calc(100vh - 32px); backdrop-filter: blur(20px); }
  @keyframes cardAppear { from { opacity:0; transform: translateY(30px) scale(0.97); } to { opacity:1; transform: translateY(0) scale(1); } }
  .auth-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; cursor: pointer; }
  .auth-logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; box-shadow: 0 8px 24px rgba(91,108,255,0.3); animation: iconFloat 3s ease-in-out infinite; }
  @keyframes iconFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .auth-logo-text { font-family: var(--font-display); font-size: 22px; font-weight: 700; line-height: 1.2; background: linear-gradient(135deg, var(--text), var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .auth-tabs { display: flex; gap: 0; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 30px; border: 1px solid var(--border); }
  .auth-tab { flex: 1; padding: 11px; border: none; background: transparent; color: var(--muted); font-family: var(--font); font-size: 14px; font-weight: 600; border-radius: 9px; cursor: pointer; transition: all var(--transition); }
  .auth-tab.active { background: linear-gradient(135deg, var(--accent), var(--accent-light)); color: #fff; box-shadow: 0 4px 16px rgba(91,108,255,0.4); }

  .field input, .field select { width: 100%; padding: 13px 16px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 14px; outline: none; transition: all var(--transition); }

  .btn-action { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 9px; background: transparent; border: none; color: var(--muted); font-size: 13px; cursor: pointer; }

  .panel-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .panel-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 14px; }

  .member-info { flex: 1; }
  .member-name { font-size: 13px; font-weight: 600; }
  .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent3); box-shadow: 0 0 8px var(--accent3); flex-shrink: 0; animation: pulse 2s infinite; }

  .club-chip { display: flex; align-items: center; gap: 10px; padding: 9px 0; }

  .group-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-card); }

  .group-body { padding: 18px; }
  .group-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .group-desc { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
  .group-meta { display: flex; justify-content: space-between; align-items: center; }
  .joined-badge { font-size: 11px; background: rgba(52,211,153,0.1); color: var(--accent3); padding: 4px 10px; border-radius: 99px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 22px; padding: 34px; width: 100%; max-width: 460px; }
  .modal input, .modal textarea { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
  .btn-cancel { padding: 10px 20px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--muted); cursor: pointer; }
  .comment-modal-body { max-height: 360px; overflow-y: auto; margin-bottom: 16px; }
  .comment-item { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .comment-content { flex: 1; }
  .comment-author { font-weight: 700; font-size: 13px; }
  .comment-time { font-size: 11px; color: var(--muted); margin-left: 8px; }
  .comment-text { font-size: 13px; margin-top: 4px; }
  .comment-delete { color: var(--accent2); font-size: 12px; cursor: pointer; opacity: 0.6; }
  .comment-delete:hover { opacity: 1; }
  .comment-input-row { display: flex; gap: 10px; }
  .comment-text-input { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 11px; color: var(--text); resize: none; outline: none; }
  @media (max-width: 768px) {
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; transform: translateX(-100%); width: 280px; z-index: 100; }
    .sidebar.open { transform: translateX(0); }

    .feed-right { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 220px; overflow-y: auto; }
    #feed-page { flex-direction: column; }
    .groups-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

<!-- Firebase SDK (module) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const app = initializeApp(FIREBASE_CONFIG);
  const db = getDatabase(app);

  window.FB = {
    ready: true,
    async set(path, val) {
      try { await set(ref(db, path), val); return true; } catch(e) { return false; }
    },
    async get(path) {
      try { const s = await get(ref(db, path)); return s.exists() ? s.val() : null; } catch(e) { return null; }
    },
    listen(path, cb) {
      return onValue(ref(db, path), snap => cb(snap.exists() ? snap.val() : null));
    }
  };
  document.dispatchEvent(new Event('firebase-ready'));
</script>

          <div class="compose-row">
            <div class="avatar" id="feed-avatar">A</div>
            <textarea class="compose-input" id="post-input" placeholder="Chia sẻ điều gì đó..."></textarea>
          </div>
          <div id="attach-preview" style="display:none; margin-top:10px; background:var(--surface2); border-radius:8px; padding:8px;"></div>
          <div class="compose-actions">
            <input type="file" id="post-image-input" accept="image/*" style="display:none" onchange="handleImageAttach(this)">
            <input type="file" id="post-file-input" style="display:none" onchange="handleFileAttach(this)">
            <button class="btn-action" onclick="document.getElementById('post-image-input').click()">📷 Ảnh</button>
            <button class="btn-action" onclick="document.getElementById('post-file-input').click()">📎 File</button>
            <button class="btn-post" onclick="submitPost()">Đăng bài</button>
          </div>
        </div>
        <div id="posts-container"></div>
      </div>
      <aside class="feed-right">
        <div class="panel-card"><div class="panel-title">👥 Bạn bè đang hoạt động</div><div id="online-friends-list"></div></div>
        <div class="panel-card"><div class="panel-title">💡 Gợi ý CLB</div><div id="suggest-clubs-list"></div></div>
      </aside>
    </div>

    <div id="groups-page" class="page">
      <div class="page-header" style="display:flex; justify-content:space-between; padding:20px 28px 0 28px;">
        <h1>Câu lạc bộ</h1>
        <button class="btn-create" onclick="openCreateModal()" style="background:var(--accent); border:none; padding:8px 16px; border-radius:10px; color:#fff;">+ Tạo CLB</button>
      </div>
      <div class="groups-grid" id="groups-grid" style="padding:20px 28px;"></div>
    </div>

    <div id="friends-page" class="page">
      <div class="friends-container" style="max-width:700px; margin:0 auto; padding:28px;">
        <input class="friends-search-bar" id="friend-search" placeholder="🔍 Tìm kiếm bạn bè..." oninput="renderFriendsList()">
        <div id="friends-list"></div>
      </div>
    </div>

    <div id="about-page" class="page">
      <div class="about-content" style="max-width:800px; margin:0 auto; padding:40px 20px;">
        <h1>THPT Vân Canh</h1>
        <p>Nền tảng kết nối học sinh với các câu lạc bộ thực tế. Dữ liệu được lưu trên Firebase, không có dữ liệu ảo.</p>
      </div>
    </div>

    <div id="club-detail-page" class="page">
      <div class="club-detail-content" style="padding:28px;">
        <button class="club-back-btn" onclick="showPage('groups')">← Quay lại</button>
        <div id="club-detail-inner"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <h2>Tạo câu lạc bộ</h2>
    <input type="text" id="new-club-name" placeholder="Tên CLB">
    <textarea id="new-club-desc" placeholder="Mô tả"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeCreateModal()">Hủy</button>
      <button class="btn-submit" onclick="createGroup()">Tạo</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="comment-modal">
  <div class="modal" style="max-width:520px">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2>💬 Bình luận</h2>
      <button class="btn-icon" onclick="closeCommentModal()">✕</button>
    </div>
    <div class="comment-modal-body" id="comments-list"></div>
    <div class="comment-input-row">
      <textarea class="comment-text-input" id="comment-input" placeholder="Viết bình luận..." rows="1"></textarea>
      <button class="btn-send" onclick="submitComment()" style="background:var(--accent); border:none; border-radius:10px; padding:0 16px; color:#fff;">Gửi</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script>
  // ========== BIẾN TOÀN CỤC ==========
  let currentUser = null;
  let posts = [], groups = [], users = [];
  let friendsSet = new Set();      // danh sách bạn bè (tên)
  let pendingRegData = null, pendingOTP = null;
  let currentCommentPostId = null;
  let postAttachImage = null, postAttachFile = null;

  // ========== HÀM TIỆN ÍCH ==========
  function showToast(msg, icon='✅') { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerHTML = `${icon} ${msg}`; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
  function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
  async function sendOTPEmail(toEmail, otp, userName) {
    try {
      await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateOtp, { email: toEmail, to_email: toEmail, passcode: otp, user_name: userName, time: new Date().toLocaleTimeString() });
      return true;
    } catch(e) { console.error(e); return false; }
  }

  // ========== XỬ LÝ AUTH ==========
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    if (!email || !pass) return showToast('Vui lòng nhập đủ thông tin', '⚠️');
    const user = users.find(u => u.email === email && u.password === pass);
    if (!user) return showToast('Sai email hoặc mật khẩu', '❌');
    loginUser(user.name);
  }

  async function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const club = document.getElementById('reg-club').value;
    if (!name || !email || pass.length<6) return showToast('Vui lòng điền đủ thông tin (mật khẩu ≥6 ký tự)', '⚠️');
    if (users.find(u => u.email === email)) return showToast('Email đã tồn tại', '❌');
    if (users.find(u => u.name === name)) return showToast('Tên đã được sử dụng', '❌');
    pendingRegData = { name, email, password: pass, club: club || 'Chưa có CLB' };
    pendingOTP = generateOTP();
    const sent = await sendOTPEmail(email, pendingOTP, name);
    if (!sent) return showToast('Gửi OTP thất bại, thử lại', '❌');
    document.getElementById('verify-modal').classList.add('open');
    showToast(`Mã OTP đã gửi đến ${email}`, '📧');
  }

  async function verifyOTP() {
    const inputs = document.querySelectorAll('#otp-inputs input');
    const code = Array.from(inputs).map(i=>i.value).join('');
    if (code !== pendingOTP) return showToast('Mã xác minh không đúng', '❌');
    users.push(pendingRegData);
    await window.FB.set('vancanh/users', users);
    closeVerify();
    showToast('Đăng ký thành công! Hãy đăng nhập.', '🎉');
    switchTab('login');
    pendingRegData = null;
  }

  function closeVerify() { document.getElementById('verify-modal').classList.remove('open'); inputsClear(); }
  function inputsClear() { document.querySelectorAll('#otp-inputs input').forEach(i=>i.value=''); }

  async function loginUser(name) {
    currentUser = users.find(u=>u.name===name);
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('sidebar-name').innerText = name;
    document.getElementById('sidebar-avatar').innerText = name.charAt(0);
    document.getElementById('feed-avatar').innerText = name.charAt(0);
    await loadUserData();
    showPage('feed');
    sessionStorage.setItem('loggedInUser', name);
  }

  async function loadUserData() {
    const safe = currentUser.name.replace(/[.#$[\]]/g, '_');
    const friendNames = await window.FB.get(`vancanh/friends/${safe}`) || [];
    friendsSet = new Set(friendNames);
    renderFriendsList(); renderOnlineFriends();
  }

  async function doLogout() {
    if (currentUser) {
      const safe = currentUser.name.replace(/[.#$[\]]/g, '_');
      await window.FB.set(`vancanh/friends/${safe}`, [...friendsSet]);
    }
    sessionStorage.removeItem('loggedInUser');
    location.reload();
  }

  // ========== HIỂN THỊ DỮ LIỆU ==========
  async function renderPosts() {
    const container = document.getElementById('posts-container');
    if (!posts.length) { container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px">Chưa có bài viết nào</div>'; return; }
    container.innerHTML = posts.map(p => `
      <div class="post-card">
        <div class="post-header">
          <div class="avatar sm">${p.author.charAt(0)}</div>
          <div><div class="post-author">${p.author}</div><div class="post-time">${p.time}</div></div>
          <span class="post-club-tag">${p.club || 'CLB'}</span>
        </div>
        <div class="post-body">${p.body}</div>
        ${p.imageData ? `<div class="post-image"><img src="${p.imageData}" alt="image"></div>` : ''}
        ${p.fileName ? `<div class="post-file">📎 ${p.fileName} (${p.fileSize})</div>` : ''}
        <div class="post-actions">
          <button class="btn-action ${p.liked?'liked':''}" onclick="toggleLike('${p.id}')">❤️ ${p.likes}</button>
          <button class="btn-action" onclick="openCommentModal('${p.id}')">💬 ${p.commentsCount || 0}</button>
        </div>
      </div>
    `).join('');
  }

  async function renderGroups() {
    const container = document.getElementById('groups-grid');
    if (!groups.length) { container.innerHTML = '<div style="color:var(--muted);text-align:center">Chưa có CLB nào, hãy tạo CLB đầu tiên!</div>'; return; }
    container.innerHTML = groups.map((g, idx) => `
      <div class="group-card" onclick="openClubDetail(${idx})">
        <div class="group-banner">${g.emoji || '🏛️'}</div>
        <div class="group-body">
          <div class="group-name">${g.name}</div>
          <div class="group-desc">${g.desc}</div>
          <div class="group-meta">
            <span class="group-members">👥 ${g.members || 0} thành viên</span>
            ${g.joined ? '<span class="joined-badge">✓ Đã tham gia</span>' : `<button class="btn-join" onclick="event.stopPropagation();joinGroup(${idx})">Tham gia</button>`}
            ${g.creator === currentUser?.name ? `<button class="btn-join" style="background:var(--accent2);" onclick="event.stopPropagation();deleteGroup(${idx})">🗑️ Xóa CLB</button>` : ''}
          </div>
        </div>
      </div>
    `).join('');
    renderSidebarMyClubs(); renderSuggestClubs();
  }

  async function joinGroup(idx) {
    const g = groups[idx];
    if (g.joined) return;
    g.joined = true;
    g.members = (g.members || 0) + 1;
    await window.FB.set('vancanh/groups', groups);
    renderGroups();
  }

  async function deleteGroup(idx) {
    if (!confirm('Bạn có chắc muốn xóa CLB này?')) return;
    groups.splice(idx,1);
    await window.FB.set('vancanh/groups', groups);
    renderGroups();
    showToast('Đã xóa CLB', '🗑️');
  }

  function renderSidebarMyClubs() {
    const myClubs = groups.filter(g => g.joined);
    const container = document.getElementById('sidebar-my-clubs');
    container.innerHTML = myClubs.map(g => `<button class="nav-item nav-item-club" onclick="openClubDetail(${groups.indexOf(g)})"><span class="nav-icon">${g.emoji||'🏛️'}</span><span>${g.name}</span></button>`).join('');
  }

  async function renderSuggestClubs() {
    const suggest = groups.filter(g => !g.joined).slice(0,3);
    const container = document.getElementById('suggest-clubs-list');
    container.innerHTML = suggest.map(g => `<div class="club-chip"><div class="club-chip-icon">${g.emoji||'🏛️'}</div><div><div>${g.name}</div><div class="member-role">${g.members} thành viên</div></div><button class="btn-join" onclick="joinGroup(${groups.indexOf(g)})">Tham gia</button></div>`).join('');
  }

  async function renderOnlineFriends() {
    const friendNames = [...friendsSet];
    const online = users.filter(u => friendNames.includes(u.name)).slice(0,5);
    const container = document.getElementById('online-friends-list');
    container.innerHTML = online.map(u => `<div class="member-row"><div class="avatar sm">${u.name.charAt(0)}</div><div class="member-info"><div class="member-name">${u.name}</div><div class="member-role">${u.club||''}</div></div><div class="online-dot"></div></div>`).join('');
  }

  async function renderFriendsList() {
    const search = document.getElementById('friend-search')?.value.toLowerCase() || '';
    const suggestions = users.filter(u => u.name !== currentUser?.name && !friendsSet.has(u.name) && u.name.toLowerCase().includes(search));
    const container = document.getElementById('friends-list');
    container.innerHTML = suggestions.map(u => `<div class="member-row"><div class="avatar">${u.name.charAt(0)}</div><div><div>${u.name}</div><div class="member-role">${u.club||''}</div></div><button class="btn-join" onclick="addFriend('${u.name}')">+ Kết bạn</button></div>`).join('');
  }

  async function addFriend(name) {
    friendsSet.add(name);
    await window.FB.set(`vancanh/friends/${currentUser.name.replace(/[.#$[\]]/g,'_')}`, [...friendsSet]);
    renderFriendsList(); renderOnlineFriends();
    showToast(`Đã gửi lời mời kết bạn đến ${name}`, '👥');
  }

  // ========== BÀI VIẾT VÀ ĐÍNH KÈM ==========
  function handleImageAttach(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => { postAttachImage = { dataUrl: e.target.result, name: file.name }; postAttachFile = null; renderAttachPreview(); };
    reader.readAsDataURL(file);
    input.value = '';
  }
  function handleFileAttach(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.type.startsWith('image/')) return handleImageAttach(input);
    postAttachFile = { name: file.name, size: (file.size/1024).toFixed(1)+' KB' };
    postAttachImage = null;
    renderAttachPreview();
    input.value = '';
  }
  function renderAttachPreview() {
    const el = document.getElementById('attach-preview');
    if (!postAttachImage && !postAttachFile) { el.style.display='none'; el.innerHTML=''; return; }
    el.style.display='block';
    if (postAttachImage) el.innerHTML = `<div><img src="${postAttachImage.dataUrl}" style="max-height:80px; border-radius:8px;"> ${postAttachImage.name} <button onclick="clearAttach()">✕</button></div>`;
    else el.innerHTML = `<div>📎 ${postAttachFile.name} (${postAttachFile.size}) <button onclick="clearAttach()">✕</button></div>`;
  }
  function clearAttach() { postAttachImage = null; postAttachFile = null; renderAttachPreview(); }

  async function submitPost() {
    const text = document.getElementById('post-input').value.trim();
    if (!text && !postAttachImage && !postAttachFile) return showToast('Vui lòng nhập nội dung hoặc đính kèm', '⚠️');
    const newPost = {
      id: Date.now().toString(),
      author: currentUser.name,
      club: currentUser.club || 'CLB',
      time: new Date().toLocaleString('vi-VN'),
      body: text,
      likes: 0,
      commentsCount: 0,
      imageData: postAttachImage ? postAttachImage.dataUrl : null,
      fileName: postAttachFile ? postAttachFile.name : null,
      fileSize: postAttachFile ? postAttachFile.size : null
    };
    posts.unshift(newPost);
    await window.FB.set('vancanh/posts', posts);
    document.getElementById('post-input').value = '';
    clearAttach();
    renderPosts();
    showToast('Đã đăng bài', '✅');
  }

  async function toggleLike(postId) {
    const post = posts.find(p=>p.id===postId);
    if (!post) return;
    const liked = post.liked;
    post.liked = !liked;
    post.likes += liked ? -1 : 1;
    await window.FB.set('vancanh/posts', posts);
    renderPosts();
  }

  // ========== BÌNH LUẬN ==========
  let comments = {}; // { postId: [ {id, author, text, time} ] }
  async function openCommentModal(postId) {
    currentCommentPostId = postId;
    const allComments = await window.FB.get('vancanh/comments') || {};
    comments = allComments;
    renderComments(postId);
    document.getElementById('comment-modal').classList.add('open');
  }
  function renderComments(postId) {
    const list = comments[postId] || [];
    const container = document.getElementById('comments-list');
    container.innerHTML = list.map(c => `
      <div class="comment-item">
        <div class="avatar sm">${c.author.charAt(0)}</div>
        <div class="comment-content">
          <div><span class="comment-author">${c.author}</span><span class="comment-time">${c.time}</span></div>
          <div class="comment-text">${c.text}</div>
        </div>
        ${c.author === currentUser?.name ? `<button class="comment-delete" onclick="deleteComment('${postId}','${c.id}')">🗑️ Xóa</button>` : ''}
      </div>
    `).join('');
  }
  async function submitComment() {
    const text = document.getElementById('comment-input').value.trim();
    if (!text || !currentCommentPostId) return;
    if (!comments[currentCommentPostId]) comments[currentCommentPostId] = [];
    const newComment = {
      id: Date.now().toString(),
      author: currentUser.name,
      text,
      time: new Date().toLocaleString('vi-VN')
    };
    comments[currentCommentPostId].push(newComment);
    await window.FB.set('vancanh/comments', comments);
    // Cập nhật số lượng bình luận trong bài viết
    const post = posts.find(p=>p.id===currentCommentPostId);
    if (post) { post.commentsCount = comments[currentCommentPostId].length; await window.FB.set('vancanh/posts', posts); renderPosts(); }
    document.getElementById('comment-input').value = '';
    renderComments(currentCommentPostId);
    showToast('Đã bình luận', '💬');
  }
  async function deleteComment(postId, commentId) {
    const list = comments[postId];
    if (!list) return;
    const idx = list.findIndex(c=>c.id===commentId);
    if (idx!==-1 && list[idx].author===currentUser.name) {
      list.splice(idx,1);
      await window.FB.set('vancanh/comments', comments);
      const post = posts.find(p=>p.id===postId);
      if (post) { post.commentsCount = list.length; await window.FB.set('vancanh/posts', posts); renderPosts(); }
      renderComments(postId);
      showToast('Đã xóa bình luận', '🗑️');
    }
  }
  function closeCommentModal() { document.getElementById('comment-modal').classList.remove('open'); currentCommentPostId = null; }

  // ========== QUẢN LÝ CLB CHI TIẾT ==========
  window.openClubDetail = function(idx) {
    const g = groups[idx];
    const detailDiv = document.getElementById('club-detail-inner');
    detailDiv.innerHTML = `<div class="club-detail-hero"><div class="club-detail-hero-emoji">${g.emoji||'🏛️'}</div><div><h2>${g.name}</h2><p>${g.desc}</p><div>👥 ${g.members} thành viên</div></div></div><div id="club-members-list"></div>`;
    const membersList = [g.creator, ...(g.membersList||[])];
    document.getElementById('club-members-list').innerHTML = membersList.map(m => `<div class="member-row"><div class="avatar sm">${m.charAt(0)}</div><div>${m}</div></div>`).join('');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('club-detail-page').classList.add('active');
    closeSidebar();
  };

  // ========== TẠO CLB ==========
  function openCreateModal() { document.getElementById('create-modal').classList.add('open'); }
  function closeCreateModal() { document.getElementById('create-modal').classList.remove('open'); }
  async function createGroup() {
    const name = document.getElementById('new-club-name').value.trim();
    const desc = document.getElementById('new-club-desc').value.trim();
    if (!name) return showToast('Vui lòng nhập tên CLB', '⚠️');
    const newGroup = {
      name, desc: desc || 'CLB mới', emoji: '🏛️', members: 1, joined: true, creator: currentUser.name, membersList: [currentUser.name]
    };
    groups.unshift(newGroup);
    await window.FB.set('vancanh/groups', groups);
    closeCreateModal();
    renderGroups();
    showToast(`Đã tạo CLB "${name}"`, '✅');
  }

  // ========== ĐIỀU HƯỚNG ==========
  function showPage(page) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(page+'-page').classList.add('active');
    if (page === 'feed') renderPosts();
    if (page === 'groups') renderGroups();
    if (page === 'friends') renderFriendsList();
    closeSidebar();
  }
  function goHome() { showPage('feed'); }
  function goHomeFromAuth() { if (currentUser) showPage('feed'); else { switchTab('login'); } }
  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab==='login'?'flex':'none';
    document.getElementById('register-form').style.display = tab==='register'?'flex':'none';
    if (tab==='register') {
      const select = document.getElementById('reg-club');
      select.innerHTML = '<option value="">Chọn CLB (thực tế)</option>' + groups.map(g=>`<option>${g.name}</option>`).join('');
    }
  }
  function openSidebar() { document.getElementById('sidebar').classList.add('open'); }
  function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }

  // ========== KHỞI TẠO DỮ LIỆU TỪ FIREBASE ==========
  async function loadAllData() {
    const [usersData, groupsData, postsData, commentsData] = await Promise.all([
      window.FB.get('vancanh/users'), window.FB.get('vancanh/groups'),
      window.FB.get('vancanh/posts'), window.FB.get('vancanh/comments')
    ]);
    users = usersData || [];
    groups = groupsData || [];
    posts = postsData || [];
    comments = commentsData || {};
    // Đánh dấu các nhóm đã tham gia cho user hiện tại
    if (currentUser) {
      const safe = currentUser.name.replace(/[.#$[\]]/g,'_');
      const joinedGroups = await window.FB.get(`vancanh/joined_groups/${safe}`) || [];
      groups.forEach(g => g.joined = joinedGroups.some(jg=>jg.name===g.name));
    }
    renderPosts(); renderGroups(); renderFriendsList(); renderOnlineFriends();
  }

  window.addEventListener('DOMContentLoaded', async () => {
    await new Promise(resolve => {
      if (window.FB && window.FB.ready) resolve();
      else document.addEventListener('firebase-ready', resolve, {once:true});
    });
    await loadAllData();
    const saved = sessionStorage.getItem('loggedInUser');
    if (saved && users.find(u=>u.name===saved)) loginUser(saved);
    else document.getElementById('auth-screen').style.display = 'flex';
    // Lắng nghe thay đổi
    window.FB.listen('vancanh/users', () => loadAllData());
    window.FB.listen('vancanh/groups', () => loadAllData());
    window.FB.listen('vancanh/posts', () => loadAllData());
    window.FB.listen('vancanh/comments', () => loadAllData());
  });
</script>
</body>
</html>
